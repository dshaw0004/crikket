services:
  caddy:
    image: caddy:2.10-alpine
    container_name: crikket-caddy
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
