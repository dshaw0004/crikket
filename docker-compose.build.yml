services:
  server:
    image: crikket-server:local
    pull_policy: never
    build:
      context: .
      dockerfile: apps/server/Dockerfile

  migrate:
    image: crikket-server:local
    pull_policy: never

  web:
    image: crikket-web:local
    pull_policy: never
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
        NEXT_PUBLIC_GOOGLE_AUTH_ENABLED: ${NEXT_PUBLIC_GOOGLE_AUTH_ENABLED:-false}
        NEXT_PUBLIC_CRIKKET_KEY: ${NEXT_PUBLIC_CRIKKET_KEY:-}
        NEXT_PUBLIC_DEMO_URL: ${NEXT_PUBLIC_DEMO_URL:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:3000}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
